<!doctype html>
<html lang="vi" data-bs-theme="light">
<head>
    <title id="pageTitle">Chi tiết sản phẩm</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="detail-page">
    
    <!-- ==================== HEADER MỚI (GIỐNG INDEX) ==================== -->
    <header class="main-header">
        <div class="container">
            <div class="row align-items-center py-2">
                
                <!-- Logo + Theme Toggle -->
                <div class="col-md-3 col-6">
                    <div class="d-flex align-items-center">
                        
                        <!-- NÚT BÓNG ĐÈN -->
                        <button id="themeToggle" class="btn-toggle-light" title="Bật/Tắt Đèn">
                            <i class="fas fa-lightbulb"></i>
                        </button>

                        <a href="index.html" class="logo ms-2">
                            <i class="fas fa-mobile-alt me-2"></i>
                            <strong>PhoneShop</strong>
                        </a>
                    </div>
                </div>
                
                <!-- Search -->
                <div class="col-md-6 d-none d-md-block">
                    <form class="search-box" onsubmit="handleSearch(event)">
                        <input type="text" class="form-control" placeholder="Tìm sản phẩm..." id="searchInput">
                        <button type="submit" class="btn-search"><i class="fas fa-search"></i></button>
                    </form>
                </div>
                
                <!-- Actions -->
                <div class="col-md-3 col-6">
                    <div class="header-actions justify-content-end">
                        <a href="#" class="action-item">
                            <i class="fas fa-user"></i>
                            <span class="d-none d-lg-inline">Đăng nhập</span>
                        </a>
                        <a href="cart.html" class="action-item cart-link">
                            <i class="fas fa-shopping-cart"></i>
                            <span class="d-none d-lg-inline">Giỏ hàng</span>
                            <span class="cart-count" id="cartCount">0</span>
                        </a>
                        <a href="./admin/admin.html" class="action-item">
                            <i class="fas fa-cog"></i>
                            <span class="d-none d-lg-inline">Quản trị</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- ==================== CATEGORY NAV ==================== -->
    <nav class="category-nav">
        <div class="container">
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link"><i class="fas fa-mobile-alt me-1"></i>Điện thoại</a></li>
                <li><a href="index.html#laptopSection" class="nav-link"><i class="fas fa-laptop me-1"></i>Laptop</a></li>
                <li><a href="index.html" class="nav-link"><i class="fas fa-headphones me-1"></i>Phụ kiện</a></li>
                <li><a href="index.html" class="nav-link"><i class="fas fa-clock me-1"></i>Smartwatch</a></li>
                <li><a href="index.html" class="nav-link"><i class="fas fa-tv me-1"></i>TV & Audio</a></li>
                <li><a href="index.html" class="nav-link"><i class="fas fa-gamepad me-1"></i>Gaming</a></li>
                <li><a href="index.html" class="nav-link text-danger"><i class="fas fa-cog me-1"></i>Dịch vụ</a></li>
            </ul>
        </div>
    </nav>

    <!-- ==================== MAIN CONTENT ==================== -->
    <main class="container py-5">
        
        <!-- Breadcrumb -->
        <nav aria-label="breadcrumb" class="detail-breadcrumb mb-4">
            <ol class="breadcrumb mb-0">
                <li class="breadcrumb-item"><a href="index.html">Trang chủ</a></li>
                <li class="breadcrumb-item"><a href="index.html#iphoneSection">Điện thoại</a></li>
                <li class="breadcrumb-item active" id="breadcrumbProduct">Chi tiết</li>
            </ol>
        </nav>

        <!-- Product Detail -->
        <div id="productDetail" class="product-detail-wrapper">
            <!-- Loading -->
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="product-tabs" id="productTabs" style="display: none;">
            <ul class="nav nav-tabs detail-tabs" id="detailTabs" role="tablist">
                <li class="nav-item">
                    <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#desc">Mô tả</button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" data-bs-toggle="tab" data-bs-target="#spec">Thông số</button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" data-bs-toggle="tab" data-bs-target="#review">Đánh giá</button>
                </li>
            </ul>
            <div class="tab-content">
                <div class="tab-pane fade show active" id="desc">
                    <div id="productDescription"></div>
                </div>
                <div class="tab-pane fade" id="spec">
                    <table class="spec-table" id="productSpecs"></table>
                </div>
                <div class="tab-pane fade" id="review">
                    <div class="text-center text-muted py-4">Chưa có đánh giá</div>
                </div>
            </div>
        </div>

        <!-- Related Products -->
        <div class="related-section mt-5">
            <h4 class="section-title">
                <i class="fas fa-th-large text-primary"></i> Sản phẩm liên quan
            </h4>
            <div id="relatedProducts" class="row g-4"></div>
        </div>

    </main>

    <!-- ==================== FOOTER ==================== -->
    <footer class="bg-dark text-white py-4 mt-5">
        <div class="container text-center">
            <p class="mb-0">&copy; 2024 PhoneShop. Designed by <strong>YourName</strong>.</p>
        </div>
    </footer>

    <!-- ==================== SCRIPTS ==================== -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script src="js/product.js"></script>
    <script src="js/detail.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/theme.js"></script>
</body>
</html>
